---
layout: default
---

<div class="home">

  <h1 class="page-heading">Topics:</h1>

  <ul class="topic-list">
    {% for topic in site.topics %}
      <li>
        <span class="topic-meta">Topic</span>
        <h2>
          <a class="topic-link" href="{{ topic.url | prepend: site.baseurl }}">{{ topic.title }}</a>
        </h2>
       <!--  <p>
          {{topic.description}}
        </p> -->
      </li>
    {% endfor %}
  </ul>

  <p class="rss-subscribe">subscribe <a href="{{ "/feed.xml" | prepend: site.baseurl }}">via RSS</a></p>

</div>
